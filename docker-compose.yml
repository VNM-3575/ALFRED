version: "3.8"

services:
  # --- Transactional Database Service ---
  postgres:
    image: postgres:15-alpine
    container_name: alfred_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - alfred_postgres_data:/var/lib/postgresql/data

  # --- Multi-Agent Core Orchestrator ---
  alfred_agents:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alfred_core
    restart: always
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    ports:
      - "8000:8000"

  # --- Reactive Marimo User Interface Portal ---
  alfred_ui:
    build: .
    container_name: alfred_ui
    restart: always
    volumes:
      - .:/app
    environment:
      - ALFRED_API_URL=http://alfred_agents:8000/chat
    ports:
      - "8501:8501"
    depends_on:
      - alfred_agents
    command: python -m marimo run marimo_app.py --host 0.0.0.0 -p 8501

  # --- Secure External Access Proxy ---
  ngrok:
    image: ngrok/ngrok:latest
    container_name: alfred_ngrok
    restart: always
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http alfred_ui:8501
    depends_on:
      - alfred_ui

# --- Dedicated Storage Persistence Volume Frame ---
volumes:
  alfred_postgres_data:
    driver: local
