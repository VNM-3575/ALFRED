services:
  # The Brain: Where MOR's data and ALFRED's memory live
  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    container_name: alfred_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alfred_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alfred_password}
      POSTGRES_DB: ${POSTGRES_DB:-alfred_warehouse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # Database UI: Adminer visualizer
  adminer:
    image: adminer
    container_name: alfred_ui_db
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  # The Agents: This is where your LangGraph code lives
  alfred_agents:
    build: .
    container_name: alfred_core
    volumes:
      - .:/app
    env_file: .env
    environment:
      # Sync the URL parameter string to match your local Docker network routing details
      - DATABASE_URL=postgresql://${POSTGRES_USER:-alfred_admin}:${POSTGRES_PASSWORD:-alfred_password}@db:5432/${POSTGRES_DB:-alfred_warehouse}?sslmode=require
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload

  alfred_ui:
    build: .
    container_name: alfred_ui
    volumes:
      - .:/app
    env_file: .env
    environment:
      - ALFRED_API_URL=http://alfred_agents:8000/chat
    ports:
      - "8501:8501"
    depends_on:
      - alfred_agents
    command: marimo run marimo_app.py --host 0.0.0.0 -p 8501

  openclaw:
    image: openclaw:latest # <-- Update this if you use a specific image name or a local build path (like build: ../OpenClaw)
    container_name: openclaw
    restart: always
    ports:
      - "8001:8000" # Mapped to 8001 on your host to prevent conflict with ALFRED
    environment:
      - HEADLESS=True

volumes:
  postgres_data:
